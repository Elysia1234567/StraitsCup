<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="参赛作品系统架构总览">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef8f5"/>
    </linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#155e75"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#475569"/>
    </marker>
    <filter id="s" x="-12%" y="-20%" width="124%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font-family:Microsoft YaHei,PingFang SC,Arial,sans-serif;font-weight:800;fill:#0f172a}
      .h{font-family:Microsoft YaHei,PingFang SC,Arial,sans-serif;font-weight:700;fill:white}
      .t{font-family:Microsoft YaHei,PingFang SC,Arial,sans-serif;fill:#334155}
      .small{font-size:15px}.mid{font-size:18px}.big{font-size:30px}
    </style>
  </defs>
  <rect width="1200" height="760" fill="url(#page)"/>
  <text x="60" y="64" class="title big">参赛作品系统架构总览</text>
  <text x="60" y="96" class="t small">面向非遗文化的数字生命共创平台：交互体验、智能编排、知识增强与生成式创作闭环</text>

  <g filter="url(#s)">
    <rect x="70" y="150" width="250" height="460" rx="18" fill="#ffffff"/>
    <rect x="70" y="150" width="250" height="58" rx="18" fill="url(#a)"/>
    <text x="98" y="186" class="h mid">用户体验层</text>
    <rect x="100" y="240" width="190" height="60" rx="12" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="134" y="275" class="t small">地域地图入口</text>
    <rect x="100" y="330" width="190" height="60" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="126" y="365" class="t small">非遗图像画廊</text>
    <rect x="100" y="420" width="190" height="60" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="126" y="455" class="t small">多智能体聊天室</text>
    <rect x="100" y="510" width="190" height="54" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="134" y="543" class="t small">AI 图像共创</text>
  </g>

  <g filter="url(#s)">
    <rect x="470" y="130" width="280" height="500" rx="18" fill="#ffffff"/>
    <rect x="470" y="130" width="280" height="58" rx="18" fill="url(#b)"/>
    <text x="498" y="166" class="h mid">智能编排层</text>
    <rect x="500" y="220" width="220" height="55" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="546" y="253" class="t small">接口与业务服务</text>
    <rect x="500" y="300" width="220" height="55" rx="12" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="548" y="333" class="t small">Agent 发言选择</text>
    <rect x="500" y="380" width="220" height="55" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="544" y="413" class="t small">提示词构建规则</text>
    <rect x="500" y="460" width="220" height="55" rx="12" fill="#fff1f2" stroke="#fecdd3"/>
    <text x="536" y="493" class="t small">流式消息广播</text>
    <rect x="500" y="540" width="220" height="45" rx="12" fill="#fefce8" stroke="#fde68a"/>
    <text x="544" y="568" class="t small">异常与兜底策略</text>
  </g>

  <g filter="url(#s)">
    <rect x="890" y="150" width="240" height="460" rx="18" fill="#ffffff"/>
    <rect x="890" y="150" width="240" height="58" rx="18" fill="url(#c)"/>
    <text x="918" y="186" class="h mid">能力与数据层</text>
    <rect x="920" y="240" width="180" height="60" rx="12" fill="#faf5ff" stroke="#e9d5ff"/>
    <text x="954" y="275" class="t small">大模型服务</text>
    <rect x="920" y="330" width="180" height="60" rx="12" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="952" y="365" class="t small">向量知识库</text>
    <rect x="920" y="420" width="180" height="60" rx="12" fill="#fef2f2" stroke="#fecaca"/>
    <text x="960" y="455" class="t small">状态缓存</text>
    <rect x="920" y="510" width="180" height="54" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="944" y="543" class="t small">数据库与对象存储</text>
  </g>

  <path d="M320 360 C382 360 405 248 470 248" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M320 450 C384 450 405 488 470 488" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M750 328 C810 328 826 270 890 270" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M750 408 C810 408 826 360 890 360" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M750 488 C810 488 826 448 890 448" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M890 538 C790 660 410 660 290 538" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="426" y="702" class="t small">闭环：提问 / 创作 → Agent 编排 → 知识增强 → 模型生成 → 实时呈现 → 数据沉淀</text>
</svg>
