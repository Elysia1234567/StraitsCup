<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniSource - 多Agent非遗聊天测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 280px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            padding: 16px;
            font-size: 16px;
            color: #e94560;
            border-bottom: 1px solid #0f3460;
        }
        .agent-list, .room-list {
            padding: 12px;
            overflow-y: auto;
        }
        .agent-item, .room-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            background: #0f3460;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }
        .agent-item:hover, .room-item:hover { background: #e94560; }
        .room-item.active { background: #e94560; }
        .agent-item .name { font-weight: bold; }
        .agent-item .role { font-size: 11px; opacity: 0.7; margin-top: 2px; }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 16px 20px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 18px; }
        .header .status {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            background: #0f3460;
        }
        .header .status.connected { background: #16c79a; color: #1a1a2e; }
        .header .status.disconnected { background: #e94560; }
        .room-agents {
            display: flex;
            gap: 8px;
            padding: 10px 20px;
            background: #111b33;
            border-bottom: 1px solid #0f3460;
            overflow-x: auto;
            align-items: center;
        }
        .room-agent {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            background: #0f3460;
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
        }
        .room-agent select {
            max-width: 120px;
            background: #16213e;
            color: #eee;
            border: 1px solid #315b8a;
            border-radius: 6px;
            padding: 4px 6px;
            font-size: 12px;
        }
        .icon-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 6px;
            background: #16213e;
            color: #eee;
            cursor: pointer;
        }
        .icon-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #e94560;
        }
        .message.agent {
            align-self: flex-start;
            background: #0f3460;
        }
        .message.agent.pending .content {
            color: #aaa;
            font-style: italic;
        }
        .message.system {
            align-self: center;
            background: transparent;
            color: #888;
            font-size: 12px;
            padding: 4px 12px;
        }
        .message .sender {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #e94560;
        }
        .message.user .sender { color: #fff; }
        .message img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 8px;
            cursor: pointer;
        }
        .typing-indicator {
            align-self: flex-start;
            background: #0f3460;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            color: #aaa;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .input-area {
            padding: 16px 20px;
            background: #16213e;
            border-top: 1px solid #0f3460;
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .input-area textarea {
            flex: 1;
            background: #0f3460;
            border: none;
            border-radius: 8px;
            padding: 12px;
            color: #eee;
            font-size: 14px;
            resize: none;
            height: 60px;
            outline: none;
        }
        .input-area textarea::placeholder { color: #888; }
        .btn {
            padding: 10px 20px;
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary {
            background: #0f3460;
            padding: 8px 14px;
            font-size: 12px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .toolbar label {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .toolbar input[type="checkbox"] {
            accent-color: #e94560;
        }
        .toolbar input[type="file"] { display: none; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #16213e;
            border-radius: 12px;
            padding: 24px;
            width: 420px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h3 {
            margin-bottom: 16px;
            color: #e94560;
        }
        .modal input, .modal select {
            width: 100%;
            background: #0f3460;
            border: none;
            padding: 10px 12px;
            border-radius: 8px;
            color: #eee;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .modal .agent-select {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .modal .agent-select label {
            padding: 6px 12px;
            background: #0f3460;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .modal .agent-select input { display: none; }
        .modal .agent-select input:checked + span {
            color: #e94560;
            font-weight: bold;
        }
        .modal .agent-select label:has(input:checked) {
            background: #e9456030;
            border: 1px solid #e94560;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #888;
        }
        .empty-state h2 { margin-bottom: 12px; }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #0f3460;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #e94560;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>聊天室</h2>
            <div class="room-list" id="roomList"></div>
            <div style="padding: 12px; border-top: 1px solid #0f3460;">
                <button class="btn" style="width: 100%;" onclick="showCreateRoom()">+ 创建聊天室</button>
            </div>
            <h2 style="border-top: 1px solid #0f3460;">Agent角色</h2>
            <div class="agent-list" id="agentList"></div>
        </div>

        <div class="main" id="mainArea">
            <div class="empty-state">
                <h2>OmniSource 多Agent非遗聊天</h2>
                <p>在左侧创建一个聊天室开始体验</p>
            </div>
        </div>
    </div>

    <!-- 创建聊天室弹窗 -->
    <div class="modal-overlay" id="createRoomModal">
        <div class="modal">
            <h3>创建聊天室</h3>
            <input type="text" id="roomName" placeholder="聊天室名称（如：福建剪纸讨论室）">
            <div class="agent-select" id="agentSelect"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideCreateRoom()">取消</button>
                <button class="btn" onclick="createRoom()">创建</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8081/api';
        const WS_BASE = 'ws://localhost:8081/ws/chat';
        let currentRoomId = null;
        let ws = null;
        let reconnectTimer = null;
        let intentionalClose = false;
        let agents = [];
        let rooms = [];
        let roomAgents = [];
        let agentBuffers = new Map();
        let agentStreamMeta = new Map();
        let imageAbortControllers = [];
        let imageGenerationStopped = false;
        let generatedImageMessageIds = new Set();

        // 初始化
        async function init() {
            await loadAgents();
            await loadRooms();
            renderAgentList();
            renderRoomList();
            renderAgentSelect();
        }

        async function loadAgents() {
            try {
                const res = await fetch(`${API_BASE}/agents`);
                const data = await res.json();
                agents = data.data || [];
            } catch (e) {
                agents = [];
            }
        }

        async function loadRooms() {
            const res = await fetch(`${API_BASE}/chat-rooms`);
            const data = await res.json();
            rooms = data.data || [];
        }

        async function loadRoomAgents(roomId) {
            const res = await fetch(`${API_BASE}/chat-rooms/${roomId}/agents`);
            const data = await res.json();
            roomAgents = data.data || [];
        }

        function renderAgentList() {
            const el = document.getElementById('agentList');
            if (agents.length === 0) {
                el.innerHTML = '<div style="padding:12px;color:#888;font-size:12px;">数据表中暂无Agent数据，请先执行 schema.sql 中的 INSERT 语句初始化</div>';
                return;
            }
            el.innerHTML = agents.map(a => `
                <div class="agent-item">
                    <div class="name">${a.name}</div>
                    <div class="role">${a.roleType} · ${a.personality}</div>
                </div>
            `).join('');
        }

        function renderRoomAgents() {
            const el = document.getElementById('roomAgents');
            if (!el) return;
            const canDelete = roomAgents.length > 1;
            el.innerHTML = roomAgents.map(member => {
                const currentAgent = agents.find(a => a.id === member.agentId);
                const currentCode = currentAgent?.agentCode || '';
                const options = agents.map(agent => `
                    <option value="${agent.agentCode}" ${agent.agentCode === currentCode ? 'selected' : ''}>
                        ${agent.name} · ${cityName(agent.agentCode)}
                    </option>
                `).join('');
                return `
                    <div class="room-agent">
                        <select onchange="replaceRoomAgent(${member.id}, this.value)">
                            ${options}
                        </select>
                        <button class="icon-btn" title="删除" ${canDelete ? '' : 'disabled'} onclick="removeRoomAgent(${member.id})">×</button>
                    </div>
                `;
            }).join('');
        }

        function renderRoomList() {
            const el = document.getElementById('roomList');
            if (rooms.length === 0) {
                el.innerHTML = '<div style="padding: 12px; color: #888; font-size: 12px;">暂无聊天室</div>';
                return;
            }
            el.innerHTML = rooms.map(r => `
                <div class="room-item ${r.id === currentRoomId ? 'active' : ''}" onclick="enterRoom(${r.id})">
                    <div style="font-weight: bold;">${r.name}</div>
                    <div style="font-size: 11px; opacity: 0.7; margin-top: 4px;">${r.memberCount} 成员 · ${r.messageCount} 消息</div>
                </div>
            `).join('');
        }

        function renderAgentSelect() {
            const el = document.getElementById('agentSelect');
            if (agents.length === 0) {
                el.innerHTML = '<div style="color:#e94560;font-size:12px;padding:8px 0;">请先初始化数据库Agent数据</div>';
                return;
            }
            el.innerHTML = agents.map(a => `
                <label>
                    <input type="checkbox" value="${a.agentCode}" ${isDefaultAgent(a.agentCode) ? 'checked' : ''}>
                    <span>${a.name} · ${cityName(a.agentCode)}</span>
                </label>
            `).join('');
        }

        function isDefaultAgent(agentCode) {
            const defaultCodes = [];
            const seenCities = new Set();
            for (const agent of agents) {
                const city = cityPrefix(agent.agentCode);
                if (!seenCities.has(city)) {
                    seenCities.add(city);
                    defaultCodes.push(agent.agentCode);
                }
                if (defaultCodes.length >= 6) break;
            }
            return defaultCodes.includes(agentCode);
        }

        function cityPrefix(agentCode) {
            return (agentCode || '').split('_')[0];
        }

        function cityName(agentCode) {
            const cityMap = {
                fz: '福州',
                xm: '厦门',
                qz: '泉州',
                zz: '漳州',
                pt: '莆田',
                np: '南平',
                sm: '三明',
                ly: '龙岩',
                nd: '宁德'
            };
            return cityMap[cityPrefix(agentCode)] || '福建';
        }

        function showCreateRoom() {
            document.getElementById('createRoomModal').classList.add('show');
        }

        function hideCreateRoom() {
            document.getElementById('createRoomModal').classList.remove('show');
        }

        async function createRoom() {
            const name = document.getElementById('roomName').value.trim();
            if (!name) return alert('请输入聊天室名称');

            const checked = document.querySelectorAll('#agentSelect input:checked');
            const agentCodes = Array.from(checked).map(c => c.value);
            if (agentCodes.length === 0) return alert('请至少选择一个Agent');
            if (agentCodes.length > 6) return alert('最多选择6个Agent');

            const res = await fetch(`${API_BASE}/chat-rooms`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, agentCodes })
            });
            const data = await res.json();
            if (data.code === 200) {
                hideCreateRoom();
                await loadRooms();
                renderRoomList();
                enterRoom(data.data.id);
            }
        }

        async function enterRoom(roomId) {
            currentRoomId = roomId;
            renderRoomList();
            await loadRoomAgents(roomId);

            const room = rooms.find(r => r.id === roomId);
            const roomName = room ? room.name : '聊天室';

            document.getElementById('mainArea').innerHTML = `
                <div class="header">
                    <h1>${roomName}</h1>
                    <div class="status disconnected" id="wsStatus">未连接</div>
                </div>
                <div class="room-agents" id="roomAgents"></div>
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <div class="toolbar">
                        <label><input type="checkbox" id="ragEnabled"> RAG模式</label>
                        <label><input type="checkbox" id="searchEnabled"> 开启联网搜索</label>
                        <button class="btn btn-secondary" onclick="document.getElementById('imageInput').click()">图片</button>
                        <button class="btn btn-secondary" onclick="generateImage()">生图</button>
                        <button class="btn btn-secondary" id="stopImageBtn" onclick="stopImageGeneration()" disabled>停止生图</button>
                        <input type="file" id="imageInput" accept="image/*" onchange="uploadImage(event)">
                        <div id="uploadPreview" style="font-size: 12px; color: #888;"></div>
                    </div>
                    <div class="input-row">
                        <textarea id="messageInput" placeholder="输入消息，与非遗数字传承人对话..."
                            onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                        <button class="btn" onclick="sendMessage()">发送</button>
                    </div>
                </div>
            `;

            renderRoomAgents();
            await loadHistory(roomId);
            connectWebSocket(roomId);
        }

        async function replaceRoomAgent(memberId, agentCode) {
            const res = await fetch(`${API_BASE}/chat-rooms/${currentRoomId}/agents/${memberId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ agentCode })
            });
            const data = await res.json();
            if (data.code !== 200) {
                alert(data.message || '替换失败');
            }
            await loadRoomAgents(currentRoomId);
            renderRoomAgents();
            await loadRooms();
            renderRoomList();
        }

        async function removeRoomAgent(memberId) {
            if (roomAgents.length <= 1) return alert('聊天室至少保留一个Agent');
            const res = await fetch(`${API_BASE}/chat-rooms/${currentRoomId}/agents/${memberId}`, {
                method: 'DELETE'
            });
            const data = await res.json();
            if (data.code !== 200) {
                alert(data.message || '删除失败');
            }
            await loadRoomAgents(currentRoomId);
            renderRoomAgents();
            await loadRooms();
            renderRoomList();
        }

        async function loadHistory(roomId) {
            const res = await fetch(`${API_BASE}/chat-rooms/${roomId}/messages/recent?limit=50`);
            const data = await res.json();
            const messages = data.data || [];
            messages.reverse().forEach(msg => renderMessage(msg));
        }

        function connectWebSocket(roomId) {
            if (ws) {
                intentionalClose = true;
                ws.close();
            }
            clearTimeout(reconnectTimer);
            intentionalClose = false;

            const wsUrl = `${WS_BASE}?roomId=${roomId}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                updateStatus(true);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleWebSocketMessage(msg);
            };

            ws.onclose = () => {
                updateStatus(false);
                ws = null;
                if (!intentionalClose) {
                    reconnectTimer = setTimeout(() => connectWebSocket(roomId), 3000);
                }
            };

            ws.onerror = () => {
                updateStatus(false);
            };
        }

        function updateStatus(connected) {
            const el = document.getElementById('wsStatus');
            if (!el) return;
            el.textContent = connected ? '已连接' : '未连接';
            el.className = 'status ' + (connected ? 'connected' : 'disconnected');
        }

        function handleWebSocketMessage(msg) {
            switch (msg.type) {
                case 'CHAT':
                case 'IMAGE':
                case 'EMOJI':
                    renderMessage(msg);
                    break;
                case 'AGENT_START':
                    createAgentSlot(msg);
                    agentBuffers.set(msg.streamId, '');
                    agentStreamMeta.set(msg.streamId, msg);
                    break;
                case 'AGENT_CHUNK':
                    appendAgentChunk(msg.streamId, msg);
                    break;
                case 'AGENT_END':
                    finalizeAgentMessage(msg.streamId, msg);
                    agentBuffers.delete(msg.streamId);
                    agentStreamMeta.delete(msg.streamId);
                    break;
                case 'SYSTEM':
                    renderSystemMessage(msg.content);
                    break;
                case 'ERROR':
                    renderAgentError(msg);
                    break;
                case 'PROGRESS':
                    updateProgress(msg.metadata?.taskId, msg.content);
                    break;
            }
            scrollToBottom();
        }

        function renderMessage(msg) {
            const container = document.getElementById('messages');
            if (!container) return;
            if (msg.messageId && document.getElementById(`msg-${msg.messageId}`)) return;
            if (msg.messageId) generatedImageMessageIds.add(String(msg.messageId));

            const isUser = msg.senderType === 'USER';
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'agent'}`;
            div.id = `msg-${msg.messageId || msg.streamId || Date.now()}`;

            let html = '';
            if (!isUser) {
                html += `<div class="sender">${msg.senderName || msg.senderId}</div>`;
            }
            html += `<div class="content">${escapeHtml(msg.content || '')}</div>`;
            if (msg.imageUrl) {
                html += `<img src="${msg.imageUrl}" onclick="window.open('${msg.imageUrl}')">`;
            }
            div.innerHTML = html;
            container.appendChild(div);
            scrollToBottom();
        }

        function renderSystemMessage(text) {
            const container = document.getElementById('messages');
            if (!container) return;
            const div = document.createElement('div');
            div.className = 'message system';
            div.textContent = text;
            container.appendChild(div);
            scrollToBottom();
        }

        function createAgentSlot(msg) {
            const container = document.getElementById('messages');
            if (!container || document.getElementById(`stream-${msg.streamId}`)) return;

            const div = document.createElement('div');
            div.className = 'message agent pending';
            div.id = `stream-${msg.streamId}`;
            div.dataset.order = msg.metadata?.order ?? '';
            div.innerHTML = `
                <div class="sender">${escapeHtml(msg.senderName || msg.senderId)}</div>
                <div class="content">正在思考...</div>
            `;
            insertAgentSlot(container, div);
            scrollToBottom();
        }

        function insertAgentSlot(container, slot) {
            const order = Number(slot.dataset.order);
            if (Number.isNaN(order)) {
                container.appendChild(slot);
                return;
            }
            const slots = Array.from(container.querySelectorAll('.message.agent[id^="stream-"]'));
            const next = slots.find(el => {
                const nextOrder = Number(el.dataset.order);
                return !Number.isNaN(nextOrder) && nextOrder > order;
            });
            if (next) {
                container.insertBefore(slot, next);
            } else {
                container.appendChild(slot);
            }
        }

        function appendAgentChunk(streamId, msg) {
            let buf = agentBuffers.get(streamId) || '';
            buf += msg.content || '';
            agentBuffers.set(streamId, buf);

            let el = document.getElementById(`stream-${streamId}`);
            if (!el) {
                createAgentSlot(msg);
                el = document.getElementById(`stream-${streamId}`);
            }
            el.classList.remove('pending');
            el.innerHTML = `<div class="sender">${escapeHtml(msg.senderName || msg.senderId)}</div><div class="content">${escapeHtml(buf)}<span class="cursor">|</span></div>`;
            scrollToBottom();
        }

        function finalizeAgentMessage(streamId, msg) {
            const el = document.getElementById(`stream-${streamId}`);
            if (el) {
                el.classList.remove('pending');
                el.id = `msg-${msg.messageId || streamId}`;
                el.innerHTML = `<div class="sender">${escapeHtml(msg.senderName || msg.senderId)}</div><div class="content">${escapeHtml(msg.content || '')}</div>`;
            }
        }

        function renderAgentError(msg) {
            const el = msg.streamId ? document.getElementById(`stream-${msg.streamId}`) : null;
            if (el) {
                el.classList.remove('pending');
                el.innerHTML = `<div class="sender">${escapeHtml(msg.senderName || msg.senderId || '系统')}</div><div class="content">错误: ${escapeHtml(msg.content || '')}</div>`;
            } else {
                renderSystemMessage('错误: ' + (msg.content || ''));
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            const preview = document.getElementById('uploadPreview');
            const imageUrl = preview.dataset.url || null;

            if (!content && !imageUrl) return;

            const searchEnabled = document.getElementById('searchEnabled')?.checked || false;
            const ragEnabled = document.getElementById('ragEnabled')?.checked || false;

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: imageUrl ? 'IMAGE' : 'CHAT',
                    content: content,
                    imageUrl: imageUrl,
                    metadata: { searchEnabled, ragEnabled }
                }));
            }

            input.value = '';
            preview.textContent = '';
            preview.dataset.url = '';
        }

        async function uploadImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const preview = document.getElementById('uploadPreview');
            preview.textContent = '上传中...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`${API_BASE}/upload/image`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.code === 200) {
                    preview.textContent = `已上传 ${file.name}`;
                    preview.dataset.url = data.data.url;
                } else {
                    preview.textContent = '上传失败';
                }
            } catch (e) {
                preview.textContent = '上传失败: ' + e.message;
            }
        }

        async function generateImage() {
            const input = document.getElementById('messageInput');
            const prompt = input.value.trim();
            if (!prompt) return alert('请先输入描述文字');
            if (roomAgents.length === 0) return alert('当前聊天室没有Agent');

            stopImageGeneration(false);
            const targets = shouldAllAgentsGenerate(prompt) ? roomAgents : [roomAgents[0]];
            imageGenerationStopped = false;
            setImageGenerating(true);
            renderSystemMessage(`正在由 ${targets.length} 个Agent生成图片: "${prompt}" ...`);

            for (const member of targets) {
                if (imageGenerationStopped) break;
                await generateImageForAgent(member, prompt);
                if (imageGenerationStopped) break;
                await sleep(1200);
            }
            setImageGenerating(false);
        }

        async function generateImageForAgent(member, prompt) {
            const agent = agents.find(a => a.id === member.agentId) || {};
            const controller = new AbortController();
            imageAbortControllers.push(controller);
            try {
                const res = await fetch(`${API_BASE}/aigc/image`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    signal: controller.signal,
                    body: JSON.stringify({
                        userId: 1,
                        roomId: currentRoomId,
                        agentCode: agent.agentCode,
                        prompt: prompt,
                        style: '水墨'
                    })
                });
                const data = await res.json();
                if (data.code === 200) {
                    const messageId = data.data.messageId;
                    if (messageId && !generatedImageMessageIds.has(String(messageId))) {
                        generatedImageMessageIds.add(String(messageId));
                        renderMessage({
                            messageId,
                            senderType: 'AGENT',
                            senderId: data.data.agentCode,
                            senderName: data.data.agentName || agent.name || 'Agent',
                            senderAvatar: data.data.agentAvatar || agent.avatar,
                            content: `${data.data.agentName || agent.name || 'Agent'} 生成了这张图片`,
                            imageUrl: data.data.imageUrl
                        });
                    } else if (!messageId) {
                        renderMessage({
                            senderType: 'AGENT',
                            senderId: data.data.agentCode,
                            senderName: data.data.agentName || agent.name || 'Agent',
                            senderAvatar: data.data.agentAvatar || agent.avatar,
                            content: `${data.data.agentName || agent.name || 'Agent'} 生成了这张图片`,
                            imageUrl: data.data.imageUrl
                        });
                    }
                } else {
                    renderSystemMessage(`${agent.name || 'Agent'} 图片生成失败: ${data.message || '未知错误'}`);
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    renderSystemMessage(`${agent.name || 'Agent'} 的图片生成已打断`);
                } else {
                    renderSystemMessage(`${agent.name || 'Agent'} 图片生成失败: ${e.message}`);
                }
            } finally {
                imageAbortControllers = imageAbortControllers.filter(item => item !== controller);
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function shouldAllAgentsGenerate(text) {
            return /你们|大家|所有人|全员|每个人|一起/.test(text || '');
        }

        function stopImageGeneration(showMessage = true) {
            imageGenerationStopped = true;
            if (imageAbortControllers.length === 0) {
                setImageGenerating(false);
                return;
            }
            imageAbortControllers.forEach(controller => controller.abort());
            imageAbortControllers = [];
            setImageGenerating(false);
            if (showMessage) renderSystemMessage('已请求打断图片生成');
        }

        function setImageGenerating(active) {
            const btn = document.getElementById('stopImageBtn');
            if (btn) btn.disabled = !active;
        }

        function updateProgress(taskId, progress) {
            console.log('Task', taskId, 'progress:', progress + '%');
        }

        function scrollToBottom() {
            const container = document.getElementById('messages');
            if (container) container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 启动
        init();
    </script>
</body>
</html>
