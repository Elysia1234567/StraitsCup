openapi: 3.0.3
info:
  title: OmniSource Backend API
  version: "2.0"
  description: |
    OmniSource 后端总接口文档。HTTP 接口基于 Spring Boot 3，默认服务端口 8081。
    WebSocket 通道通过 x-websocket 扩展字段记录，标准 OpenAPI paths 仅描述 HTTP/SSE 接口。
servers:
  - url: http://localhost:8081
    description: Local development server
tags:
  - name: AIGC
    description: 普通问答、流式问答、多模态理解与图片生成
  - name: Agent
    description: 非遗 Agent 查询
  - name: Chat
    description: 多 Agent 联合问答
  - name: ChatRoom
    description: 聊天室、成员与历史消息
  - name: RAG
    description: 知识库重建、检索与 Prompt 预览
  - name: Upload
    description: 文件上传
paths:
  /api/aigc/chat:
    get:
      tags: [AIGC]
      summary: 普通 AI 问答
      parameters:
        - $ref: "#/components/parameters/MessageQuery"
      responses:
        "200":
          description: 纯文本回答
          content:
            text/plain:
              schema:
                type: string
              example: 你好，我是 OmniSource AI 助手。
  /api/aigc/stream:
    get:
      tags: [AIGC]
      summary: SSE 流式 AI 问答
      description: 内部会拼接 RAG 检索上下文后流式输出。
      parameters:
        - name: message
          in: query
          required: false
          schema:
            type: string
            default: 你好，请自我介绍
      responses:
        "200":
          description: SSE 文本流
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                data: 寿山石雕
                data: 以石质温润
                data: 和雕刻精细见长
  /api/aigc/multimodal:
    post:
      tags: [AIGC]
      summary: 图片理解问答
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultimodalRequest"
            example:
              imageUrl: https://example.com/image.png
              question: 请描述这张图片
      responses:
        "200":
          description: 图片理解结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringResult"
              example:
                code: 200
                message: success
                data: 图片中展示了一件传统工艺作品，具有雕刻纹理和装饰性细节。
                timestamp: "2026-05-03T10:00:00"
  /api/aigc/image:
    post:
      tags: [AIGC]
      summary: 生成图片
      description: 传入 roomId 和有效 agentCode 时，生成结果会写入聊天室并广播。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageGenerateRequest"
      responses:
        "200":
          description: 图片生成结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGenerateResult"
              example:
                code: 200
                message: success
                data:
                  imageUrl: https://java-ai-fzu.oss-cn-beijing.aliyuncs.com/OmniSource/chatroom/example.png
                  agentCode: fz_shoushan_stone
                  agentName: 寿山石雕器灵
                  agentAvatar: https://example.com/avatar.png
                  sourceImageUrl: https://java-ai-fzu.oss-cn-beijing.aliyuncs.com/OmniSource/source/福州/寿山石雕.png
                  messageId: "101"
                timestamp: "2026-05-03T10:00:00"
  /api/aigc/image/tasks/{taskId}:
    get:
      tags: [AIGC]
      summary: 查询图片生成任务
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 图片生成任务
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGenerationTaskResult"
              example:
                code: 200
                message: success
                data:
                  id: 1
                  taskId: task_abc123
                  userId: 1
                  roomId: 1001
                  prompt: 生成一张寿山石雕风格海报
                  style: 国风插画
                  status: SUCCEEDED
                  resultUrl: https://example.com/generated.png
                  errorMessage: null
                  progress: 100
                  model: qwen-image-2.0-pro
                  createTime: "2026-05-03T10:00:00"
                  updateTime: "2026-05-03T10:00:30"
                timestamp: "2026-05-03T10:00:30"
  /api/agents:
    get:
      tags: [Agent]
      summary: 获取启用的 Agent 列表
      responses:
        "200":
          description: Agent 列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResult"
              example:
                code: 200
                message: success
                data:
                  - id: 1
                    agentCode: fz_shoushan_stone
                    name: 寿山石雕器灵
                    avatar: https://example.com/avatar.png
                    roleType: HERITAGE_AGENT
                    personality: 沉稳、细致、熟悉寿山石文化
                    maxTokens: 1200
                    temperature: 0.7
                    topP: 0.9
                    status: 1
                timestamp: "2026-05-03T10:00:00"
  /api/agents/{code}:
    get:
      tags: [Agent]
      summary: 按编码获取 Agent 详情
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: fz_shoushan_stone
      responses:
        "200":
          description: Agent 详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResult"
              example:
                code: 200
                message: success
                data:
                  id: 1
                  agentCode: fz_shoushan_stone
                  name: 寿山石雕器灵
                  avatar: https://example.com/avatar.png
                  roleType: HERITAGE_AGENT
                  personality: 沉稳、细致、熟悉寿山石文化
                  knowledgeScope: 福州寿山石雕
                  languageStyle: 温和讲解
                  maxTokens: 1200
                  temperature: 0.7
                  topP: 0.9
                  isPreset: 1
                  sortOrder: 1
                  status: 1
                  isDeleted: 0
                timestamp: "2026-05-03T10:00:00"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/chat:
    post:
      tags: [Chat]
      summary: 发起多 Agent 联合问答
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultiAgentChatRequest"
      responses:
        "200":
          description: 多 Agent 问答结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultiAgentChatResult"
              example:
                code: 200
                message: 多智能体问答成功
                data:
                  sessionId: session_001
                  query: 寿山石雕有哪些特点？
                  heritageId: fz_shoushan_stone
                  finalAnswer: 寿山石雕的特点包括石质温润、色彩丰富、因材施艺和题材多样。
                  agentReplies:
                    - agentCode: fz_shoushan_stone
                      title: 寿山石雕器灵
                      content: 寿山石雕重视石色、纹理与雕刻题材的结合。
                      references:
                        - chunk-001
                      searchUsed: false
                  retrievals:
                    - id: chunk-001
                      title: 寿山石雕
                      score: 0.92
                      content: 寿山石雕是福州传统工艺。
                      metadata:
                        city: 福州
                  webSearchResult: null
                timestamp: "2026-05-03T10:00:00"
  /api/chat/{sessionId}:
    get:
      tags: [Chat]
      summary: 查询会话最近一次结果
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 会话结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultiAgentChatResult"
              example:
                code: 200
                message: success
                data:
                  sessionId: session_001
                  query: 寿山石雕有哪些特点？
                  heritageId: fz_shoushan_stone
                  finalAnswer: 寿山石雕的特点包括石质温润、色彩丰富、因材施艺和题材多样。
                  agentReplies: []
                  retrievals: []
                  webSearchResult: null
                timestamp: "2026-05-03T10:00:00"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/chat-rooms:
    get:
      tags: [ChatRoom]
      summary: 获取当前用户聊天室列表
      responses:
        "200":
          description: 聊天室列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoomListResult"
              example:
                code: 200
                message: success
                data:
                  - id: 1001
                    roomCode: ROOM202605030001
                    userId: 1
                    themeId: 1
                    name: 福州非遗讨论室
                    maxMembers: 6
                    memberCount: 2
                    messageCount: 8
                    status: 1
                    createTime: "2026-05-03T10:00:00"
                    updateTime: "2026-05-03T10:05:00"
                    isDeleted: 0
                timestamp: "2026-05-03T10:00:00"
    post:
      tags: [ChatRoom]
      summary: 创建聊天室
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatRoomRequest"
      responses:
        "200":
          description: 已创建的聊天室
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoomResult"
              example:
                code: 200
                message: success
                data:
                  id: 1001
                  roomCode: ROOM202605030001
                  userId: 1
                  themeId: 1
                  name: 福州非遗讨论室
                  description: null
                  maxMembers: 6
                  memberCount: 2
                  messageCount: 0
                  status: 1
                  createTime: "2026-05-03T10:00:00"
                  updateTime: "2026-05-03T10:00:00"
                  isDeleted: 0
                timestamp: "2026-05-03T10:00:00"
  /api/chat-rooms/{roomId}:
    get:
      tags: [ChatRoom]
      summary: 获取聊天室详情
      parameters:
        - $ref: "#/components/parameters/RoomId"
      responses:
        "200":
          description: 聊天室详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoomResult"
              example:
                code: 200
                message: success
                data:
                  id: 1001
                  roomCode: ROOM202605030001
                  userId: 1
                  themeId: 1
                  name: 福州非遗讨论室
                  description: null
                  maxMembers: 6
                  memberCount: 2
                  messageCount: 8
                  status: 1
                  createTime: "2026-05-03T10:00:00"
                  updateTime: "2026-05-03T10:05:00"
                  isDeleted: 0
                timestamp: "2026-05-03T10:00:00"
    delete:
      tags: [ChatRoom]
      summary: 解散聊天室
      parameters:
        - $ref: "#/components/parameters/RoomId"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoidResult"
              example:
                code: 200
                message: success
                data: null
                timestamp: "2026-05-03T10:00:00"
  /api/chat-rooms/{roomId}/agents:
    get:
      tags: [ChatRoom]
      summary: 获取聊天室 Agent 成员
      parameters:
        - $ref: "#/components/parameters/RoomId"
      responses:
        "200":
          description: 成员列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoomMemberListResult"
              example:
                code: 200
                message: success
                data:
                  - id: 10
                    roomId: 1001
                    memberType: AGENT
                    userId: null
                    agentId: 1
                    displayName: 寿山石雕器灵
                    avatar: https://example.com/avatar.png
                    roleInRoom: MEMBER
                    lastSpeakTime: "2026-05-03T10:04:00"
                    speakCount: 3
                    joinTime: "2026-05-03T10:00:00"
                    status: 1
                    isDeleted: 0
                timestamp: "2026-05-03T10:00:00"
  /api/chat-rooms/{roomId}/agents/{memberId}:
    put:
      tags: [ChatRoom]
      summary: 替换聊天室 Agent
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - $ref: "#/components/parameters/MemberId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceRoomAgentRequest"
      responses:
        "200":
          description: 替换后的成员
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatRoomMemberResult"
              example:
                code: 200
                message: success
                data:
                  id: 10
                  roomId: 1001
                  memberType: AGENT
                  agentId: 4
                  displayName: 厦门珠绣器灵
                  avatar: https://example.com/xm-avatar.png
                  roleInRoom: MEMBER
                  speakCount: 0
                  status: 1
                timestamp: "2026-05-03T10:00:00"
        "400":
          $ref: "#/components/responses/BadRequest"
    delete:
      tags: [ChatRoom]
      summary: 移除聊天室 Agent
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - $ref: "#/components/parameters/MemberId"
      responses:
        "200":
          description: 移除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoidResult"
              example:
                code: 200
                message: success
                data: null
                timestamp: "2026-05-03T10:00:00"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/chat-rooms/{roomId}/messages:
    get:
      tags: [ChatRoom]
      summary: 分页获取历史消息
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
      responses:
        "200":
          description: 历史消息列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageListResult"
              example:
                code: 200
                message: success
                data:
                  - id: 501
                    roomId: 1001
                    messageType: TEXT
                    senderType: USER
                    senderId: "1"
                    senderName: 匿名用户
                    content: 介绍一下寿山石雕
                    imageUrl: null
                    isStream: 0
                    searchEnabled: 1
                    createTime: "2026-05-03T10:00:00"
                timestamp: "2026-05-03T10:00:00"
  /api/chat-rooms/{roomId}/messages/recent:
    get:
      tags: [ChatRoom]
      summary: 获取最近历史消息
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
      responses:
        "200":
          description: 最近消息列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageListResult"
              example:
                code: 200
                message: success
                data:
                  - id: 502
                    roomId: 1001
                    messageType: TEXT
                    senderType: AGENT
                    senderId: fz_shoushan_stone
                    senderName: 寿山石雕器灵
                    content: 寿山石雕以石色天然、雕工细腻见长。
                    isStream: 0
                    searchEnabled: 1
                    createTime: "2026-05-03T10:01:00"
                timestamp: "2026-05-03T10:01:00"
  /api/rag/reload:
    post:
      tags: [RAG]
      summary: 重建知识库
      responses:
        "200":
          description: 重建结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagReloadResult"
              example:
                code: 200
                message: success
                data:
                  ready: true
                  message: RAG 知识库已重建
                timestamp: "2026-05-03T10:00:00"
  /api/rag/retrieve:
    get:
      tags: [RAG]
      summary: 向量检索调试
      parameters:
        - $ref: "#/components/parameters/Question"
        - $ref: "#/components/parameters/TopK"
      responses:
        "200":
          description: 检索结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagRetrievalListResult"
              example:
                code: 200
                message: success
                data:
                  - id: chunk-001
                    title: 寿山石雕
                    score: 0.92
                    content: 寿山石雕是福州传统工艺，强调因材施艺。
                    metadata:
                      city: 福州
                      category: 传统美术
                timestamp: "2026-05-03T10:00:00"
  /api/rag/prompt:
    get:
      tags: [RAG]
      summary: 预览拼接后的 RAG 上下文
      parameters:
        - $ref: "#/components/parameters/Question"
        - $ref: "#/components/parameters/TopK"
      responses:
        "200":
          description: Prompt 文本
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringResult"
              example:
                code: 200
                message: success
                data: "【检索资料】\n标题：寿山石雕\n内容：寿山石雕是福州传统工艺..."
                timestamp: "2026-05-03T10:00:00"
  /api/upload/image:
    post:
      tags: [Upload]
      summary: 上传图片到 OSS
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: 上传结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadImageResult"
              example:
                code: 200
                message: success
                data:
                  url: https://java-ai-fzu.oss-cn-beijing.aliyuncs.com/OmniSource/upload/example.png
                  filename: example.png
                timestamp: "2026-05-03T10:00:00"
x-websocket:
  /ws/chat:
    summary: 聊天室实时消息通道
    url: ws://localhost:8081/ws/chat?roomId={roomId}
    queryParameters:
      roomId:
        type: integer
        format: int64
        required: true
    messageSchema:
      $ref: "#/components/schemas/WebSocketMessage"
components:
  parameters:
    MessageQuery:
      name: message
      in: query
      required: false
      schema:
        type: string
        default: 你好
    RoomId:
      name: roomId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Question:
      name: question
      in: query
      required: true
      schema:
        type: string
    TopK:
      name: topK
      in: query
      required: false
      schema:
        type: integer
        default: 3
        minimum: 1
  responses:
    BadRequest:
      description: 参数错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResult"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResult"
  schemas:
    ResultBase:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        timestamp:
          type: string
          format: date-time
    ErrorResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
        - type: object
          properties:
            data:
              nullable: true
      example:
        code: 400
        message: 参数错误
        data: null
        timestamp: "2026-05-03T10:00:00"
    VoidResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
        - type: object
          properties:
            data:
              nullable: true
    StringResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
        - type: object
          properties:
            data:
              type: string
    AgentResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Agent"
    AgentListResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Agent"
    ChatRoomResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ChatRoom"
    ChatRoomListResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ChatRoom"
    ChatRoomMemberResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ChatRoomMember"
    ChatRoomMemberListResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ChatRoomMember"
    ChatMessageListResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ChatMessage"
    MultiAgentChatResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/MultiAgentChatResponse"
    RagRetrievalListResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/RagRetrievalResponse"
    RagReloadResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                ready:
                  type: boolean
                message:
                  type: string
    ImageGenerateResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                imageUrl:
                  type: string
                  format: uri
                agentCode:
                  type: string
                agentName:
                  type: string
                agentAvatar:
                  type: string
                sourceImageUrl:
                  type: string
                messageId:
                  type: string
    ImageGenerationTaskResult:
      allOf:
        - $ref: "#/components/schemas/ResultBase"
