server:
  port: 8081

spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: OmniSource
  ai:
    openai:
      api-key: ${qianwen.api-key:${QIANWEN_API_KEY:}}
      base-url: ${qianwen.base-url:${QIANWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}}
      chat:
        options:
          model: ${qianwen.model:${QIANWEN_MODEL:qwen3.5-flash}}
          temperature: 0.7
          max-tokens: 2000
  datasource:
    url: ${mysql.url:${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/omni_source?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true}}
    username: ${mysql.username:${MYSQL_USERNAME:root}}
    password: ${mysql.password:${MYSQL_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${redis.host:${REDIS_HOST:127.0.0.1}}
      port: ${redis.port:${REDIS_PORT:6379}}
      password: ${redis.password:${REDIS_PASSWORD:}}
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# JWT配置
jwt:
  # JWT密钥（生产环境请使用环境变量或配置中心）
  secret: T21uaVNvdXJjZVNlY3JldEtleTIwMjZGb3JKV1RHZW5lcmF0aW9uQW5kVmFsaWRhdGlvbg==
  # Access Token有效期（毫秒，默认2小时）
  access-token-expiration: 7200000
  # Refresh Token有效期（毫秒，默认7天）
  refresh-token-expiration: 604800000

# MyBatis配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml

# 千问API配置
qianwen:
  api-key: ${qianwen.api-key:${QIANWEN_API_KEY:}}
  base-url: ${qianwen.base-url:${QIANWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}}
  model: ${qianwen.model:${QIANWEN_MODEL:qwen3.5-flash}}

# RAG知识库配置
rag:
  dataset-path: Util/standardList.jsonl
  default-top-k: 3

milvus:
  host: ${milvus.host:${MILVUS_HOST:127.0.0.1}}
  port: ${milvus.port:${MILVUS_PORT:19530}}
  username: ${milvus.username:${MILVUS_USERNAME:}}
  password: ${milvus.password:${MILVUS_PASSWORD:}}
  database: ${milvus.database:${MILVUS_DATABASE:default}}
