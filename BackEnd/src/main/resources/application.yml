server:
  port: 8081

spring:
  application:
    name: OmniSource
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  ai:
    openai:
      api-key: ${qianwen.api-key}
      base-url: ${qianwen.base-url}
      chat:
        options:
          model: ${qianwen.model}
          temperature: 0.7
          max-tokens: 2000
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# MyBatis配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml

# 千问API配置
qianwen:
  api-key: ${QIANWEN_API_KEY}
  base-url: ${QIANWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
  model: ${QIANWEN_MODEL:qwen3.5-plus}
  image-model: ${QIANWEN_IMAGE_MODEL:qwen-image-2.0-pro}
  image-api-url: ${QIANWEN_IMAGE_API_URL:https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation}
  image-task-url: ${QIANWEN_IMAGE_TASK_URL:https://dashscope.aliyuncs.com/api/v1/tasks}
  image-size: ${QIANWEN_IMAGE_SIZE:1024*1024}

# Milvus
milvus:
  host: ${MILVUS_HOST}
  port: ${MILVUS_PORT:19530}
  database: ${MILVUS_DATABASE:default}
  username: ${MILVUS_USERNAME:}
  password: ${MILVUS_PASSWORD:}

# 阿里云OSS
aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:java-ai-fzu}
    folder: ${ALIYUN_OSS_FOLDER:OmniSource/}
    public-base-url: ${ALIYUN_OSS_PUBLIC_BASE_URL:https://java-ai-fzu.oss-cn-beijing.aliyuncs.com}
    appearance-folder: ${ALIYUN_OSS_APPEARANCE_FOLDER:OmniSource/appearance/}
    agent-image-folder: ${ALIYUN_OSS_AGENT_IMAGE_FOLDER:OmniSource/chatroom/agents/}

# Tavily
tavily:
  api-key: ${TAVILY_API_KEY}
  max-results: ${TAVILY_MAX_RESULTS:3}

# 聊天室配置
chat:
  room:
    max-agents: 6
  history:
    redis-limit: 50
    context-limit: 10
  agent:
    cooldown-seconds: 30
    max-responders: 3
